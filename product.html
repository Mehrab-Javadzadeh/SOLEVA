<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Soleva | Product</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- top navigation -->
    <div class="top-nav">
        <div class="nav-left">
            <a href="index.html" style="color: white; text-decoration: none;">
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>
        <div class="nav-center">
            <img src="images/logo.png.jpg" class="logo" alt="Soleva Logo">
        </div>
        <div class="nav-right">
            <i class="fas fa-user" id="userIcon"></i>
            <i class="fas fa-shopping-bag" id="cartIcon"></i>
            <i class="fas fa-bars" id="menuIcon"></i>
        </div>
    </div>

    <!-- side menu -->
    <div id="sideMenu" class="side-menu">
        <div class="side-menu-header">
            <h2>Soleva</h2>
            <i class="fas fa-times" id="closeMenu"></i>
        </div>
        <div class="side-menu-body">
            <div id="menuUserStatus" class="menu-user-status">
                <i class="fas fa-user-circle" id="menuUserIcon"></i>
                <div>
                    <div id="menuUserName">Guest</div>
                    <div id="menuUserEmail" class="menu-user-email">Not logged in</div>
                </div>
            </div>
            <hr>
            <div class="menu-items">
                <a href="index.html" class="menu-item"><i class="fas fa-home"></i> Home</a>
                <a href="#" class="menu-item" id="menuAuthAction" onclick="openAuthFromMenu()">
                    <i class="fas fa-sign-in-alt"></i> <span id="menuAuthText">Login / Register</span>
                </a>
                <a href="#" class="menu-item" onclick="logoutFromMenu()" id="menuLogoutBtn" style="display: none;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
                <a href="#" class="menu-item" onclick="openCartFromMenu()">
                    <i class="fas fa-shopping-bag"></i> My Orders
                </a>
            </div>
        </div>
    </div>

    <!-- product detail area -->
    <div id="productContainer" style="margin-top: 90px; padding: 20px; min-height: 400px;">
        <div style="text-align: center; margin-top: 100px;">
            <i class="fas fa-spinner fa-pulse" style="font-size: 50px; color: #000;"></i>
            <p style="margin-top: 20px;">Loading product...</p>
        </div>
    </div>

    <!-- cart overlay -->
    <div id="cartPage" class="cart-page">
        <div class="cart-header">
            <i class="fas fa-arrow-right" id="closeCart"></i>
            <h2><i class="fas fa-shopping-bag"></i> Shopping Cart</h2>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">Total: <span id="cartTotal">0</span> T</div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <!-- checkout modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeCheckout">&times;</span>
            <div class="auth-form">
                <h2>Complete Order</h2>
                <div id="checkoutError" class="error-msg"></div>
                <input type="tel" id="checkoutPhone" placeholder="Phone number (e.g. 09121234567)" maxlength="11">
                <textarea id="checkoutAddress" placeholder="Full delivery address (Province, City, Street, No.)" rows="4"></textarea>
                <div id="checkoutSummary" class="checkout-summary"></div>
                <button onclick="submitOrder()">Place Order</button>
            </div>
        </div>
    </div>

    <!-- auth modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeAuth">&times;</span>

            <div id="registerForm" class="auth-form">
                <h2>Create Account</h2>
                <div id="registerError" class="error-msg"></div>
                <input type="email" id="regEmail" placeholder="Your Email">
                <div style="position: relative; width: 100%;">
                    <input type="password" id="regPassword" placeholder="Password (Min 6 characters)" style="width: 100%; padding-right: 45px;">
                    <i class="fas fa-eye" id="toggleRegPassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; font-size: 18px;"></i>
                </div>
                <button onclick="registerUser()">Register</button>
                <p class="switch-form">Already have an account? <span onclick="toggleAuth('login')">Login</span></p>
            </div>

            <div id="loginForm" class="auth-form" style="display: none;">
                <h2>Login</h2>
                <div id="loginError" class="error-msg"></div>
                <input type="email" id="logEmail" placeholder="Your Email">
                <div style="position: relative; width: 100%;">
                    <input type="password" id="logPassword" placeholder="Password" style="width: 100%; padding-right: 45px;">
                    <i class="fas fa-eye" id="toggleLogPassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; font-size: 18px;"></i>
                </div>
                <button onclick="loginUser()">Login</button>
                <p class="switch-form">Don't have an account? <span onclick="toggleAuth('register')">Register</span></p>
            </div>

            <div id="profileView" class="auth-form" style="display: none;">
                <h2>Welcome!</h2>
                <p id="userEmailDisplay"></p>
                <button onclick="logoutUser()" class="logout-btn">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // load product details
        function loadProduct() {
            let params = new URLSearchParams(window.location.search);
            let productId = params.get('id');
            let container = document.getElementById('productContainer');

            // wait for productsData from script.js
            if (typeof productsData === 'undefined') {
                setTimeout(loadProduct, 100);
                return;
            }

            if (productId && productsData[productId]) {
                window.currentProductId = productId;
                let p = productsData[productId];

                // build thumbnail images
                let thumbnails = '';
                for (let i = 0; i < p.images.length; i++) {
                    thumbnails += '<img src="' + p.images[i] + '" style="width:80px;height:80px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:0.3s;" onmouseover="this.style.borderColor=\'black\'" onmouseout="this.style.borderColor=\'transparent\'" onclick="document.getElementById(\'mainImage\').src=\'' + p.images[i] + '\'">';
                }

                container.innerHTML = 
                    '<div style="background:#f5f5f5;padding:60px 20px 30px;text-align:center;">' +
                        '<img id="mainImage" src="' + p.images[0] + '" style="width:400px;height:400px;object-fit:cover;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.2);">' +
                        '<div style="display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin-top:20px;">' + thumbnails + '</div>' +
                    '</div>' +
                    '<div style="max-width:800px;margin:0 auto;padding:30px;text-align:center;">' +
                        '<h1 style="font-size:28px;margin-bottom:15px;color:#000;">' + p.name + '</h1>' +
                        '<div style="font-size:32px;font-weight:bold;color:#c62828;margin:20px 0;">' + p.price.toLocaleString() + ' T</div>' +
                        '<div style="font-size:16px;line-height:1.8;color:#111;margin:20px 0;text-align:center;">' + p.description.replace(/\//g, '<br>') + '</div>' +
                        '<div style="margin:30px 0;">' +
                            '<label style="font-weight:bold;">Size : </label>' +
                            '<select id="sizeSelect" style="padding:12px 20px;font-size:16px;border-radius:8px;border:1px solid #000;">' +
                                '<option>40</option><option>41</option><option>42</option><option>43</option><option>44</option>' +
                            '</select>' +
                        '</div>' +
                        '<button onclick="addToCartFromDetail()" style="background:black;color:white;padding:15px 40px;font-size:18px;border:none;border-radius:30px;cursor:pointer;transition:0.3s;" onmouseover="this.style.transform=\'scale(1.05)\'" onmouseout="this.style.transform=\'scale(1)\'">' +
                            '<i class="fas fa-shopping-bag"></i> Add to Cart' +
                        '</button>' +
                    '</div>';
            } else {
                container.innerHTML = 
                    '<div style="text-align:center;margin-top:100px;">' +
                        '<i class="fas fa-exclamation-triangle" style="font-size:80px;color:#c62828;"></i>' +
                        '<h1 style="margin-top:30px;">❌ Product Not Found</h1>' +
                        '<p style="color:#666;margin-top:20px;">The product you are looking for does not exist.</p>' +
                        '<a href="index.html" style="display:inline-block;margin-top:40px;background:black;color:white;padding:12px 30px;border-radius:30px;text-decoration:none;">← Back to Shop</a>' +
                    '</div>';
            }
        }

        function addToCartFromDetail() {
            let sizeSelect = document.getElementById('sizeSelect');
            if (sizeSelect && window.currentProductId && typeof addToCart !== 'undefined') {
                if (addToCart(window.currentProductId, sizeSelect.value)) {
                    alert('✅ Product added to cart');
                }
            } else {
                alert('Please try again');
            }
        }

        // start loading product
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProduct);
        } else {
            loadProduct();
        }

        // menu icon click handler
        document.addEventListener('DOMContentLoaded', function() {
            let menuIcon = document.getElementById('menuIcon');
            if (menuIcon) {
                menuIcon.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (typeof openMenu === 'function') {
                        openMenu();
                    }
                });
            }
        });
    </script>

</body>
</html>
